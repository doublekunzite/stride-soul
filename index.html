<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stride & Soul - Premium Running Shoes</title>
    <style>
        /* Minimal CSS for the chat widget */
        body { font-family: sans-serif; padding: 20px; }
        
        /* Chat Widget Container */
        #chat-widget { 
            position: fixed; bottom: 20px; right: 20px; width: 350px; 
            background: white; border-radius: 10px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); 
            display: none; flex-direction: column; height: 500px; z-index: 1000;
        }
        
        #chat-header { background: #333; color: white; padding: 15px; border-radius: 10px 10px 0 0; }
        
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; }
        .bot-msg { background: #f1f1f1; color: black; align-self: flex-start; }
        
        /* Input Area */
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 8px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }
        
        /* Sample Questions */
        .sample-questions { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; background: #fafafa; }
        .sample-btn { 
            background: white; border: 1px solid #007bff; color: #007bff; 
            padding: 5px 10px; border-radius: 15px; font-size: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .sample-btn:hover { background: #007bff; color: white; }

        /* Toggle Button */
        #chat-toggle { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #007bff; color: white; border: none; 
            width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Welcome to Stride & Soul</h1>
    <p>The best running shoes for your next marathon.</p>
    <button id="chat-toggle">💬</button>

    <!-- The Chat Widget -->
    <div id="chat-widget">
        <div id="chat-header">
            <strong>Running Shoe Expert</strong>
            <button onclick="toggleChat()" style="float:right; background:none; border:none; color:white; cursor:pointer;">✖</button>
        </div>
        
        <div id="chat-messages">
            <div class="message bot-msg">Hi there! 👟 I'm your shoe expert. How can I help you find the perfect fit?</div>
        </div>

        <!-- Sample Questions Area -->
        <div class="sample-questions" id="sample-area">
            <button class="sample-btn" onclick="askSample('I have flat feet, what do you recommend?')">Flat feet advice</button>
            <button class="sample-btn" onclick="askSample('I need shoes for a marathon under $150')">Marathon budget</button>
            <button class="sample-btn" onclick="askSample('What is the difference between the AirFlow and TrailBlazer?')">Compare models</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- Configuration ---
        // NOTE: When running locally, we use a relative path. 
        // When you deploy, this URL will be your Vercel URL.
        // For testing locally, you will run a local server (instructions below).
        const API_URL = 'https://stride-soul.vercel.app/api/chat'; 

        // --- UI Logic ---
        const chatWidget = document.getElementById('chat-widget');
        const chatToggle = document.getElementById('chat-toggle');
        const messagesDiv = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sampleArea = document.getElementById('sample-area');

        function toggleChat() {
            chatWidget.style.display = chatWidget.style.display === 'flex' ? 'none' : 'flex';
            chatToggle.style.display = chatWidget.style.display === 'flex' ? 'none' : 'block';
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.classList.add('message', sender === 'user' ? 'user-msg' : 'bot-msg');
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto scroll
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function askSample(question) {
            userInput.value = question;
            sendMessage();
        }

        // --- Core Chat Logic ---
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Update UI immediately
            addMessage(text, 'user');
            userInput.value = '';
            sampleArea.style.display = 'none'; // Hide samples after first interaction

            // 2. Show "Thinking..." state (Level 2 Skill)
            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('message', 'bot-msg');
            loadingDiv.textContent = 'Thinking...';
            messagesDiv.appendChild(loadingDiv);

            try {
                // 3. Call our Secure Proxy
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: [{ role: 'user', content: text }] 
                    })
                });

                const data = await response.json();

                // 4. Display result
                loadingDiv.textContent = data.reply || "Sorry, I couldn't connect to the shoe database.";

            } catch (error) {
                loadingDiv.textContent = "Error connecting to server. Is the backend running?";
                console.error(error);
            }
        }
    </script>
</body>
</html>
