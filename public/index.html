<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stride & Soul - Premium Running Shoes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob-container">
        <!-- These are simple SVG paths that look like shoe soles -->
        <svg class="shoe-blob blob-1" viewBox="0 0 100 40">
            <path d="M10,30 Q20,5 50,10 Q90,15 95,30 Q90,40 50,38 Q10,40 10,30 Z" />
        </svg>
        <svg class="shoe-blob blob-2" viewBox="0 0 100 40">
            <path d="M10,30 Q20,5 50,10 Q90,15 95,30 Q90,40 50,38 Q10,40 10,30 Z" />
        </svg>
        <svg class="shoe-blob blob-3" viewBox="0 0 100 40">
            <path d="M10,30 Q20,5 50,10 Q90,15 95,30 Q90,40 50,38 Q10,40 10,30 Z" />
        </svg>
        <svg class="shoe-blob blob-4" viewBox="0 0 100 40">
            <path d="M10,30 Q20,5 50,10 Q90,15 95,30 Q90,40 50,38 Q10,40 10,30 Z" />
        </svg>
    </div>

    <!-- Main Site Content -->
    <header>
        <div class="logo">STRIDE & SOUL</div>
        <nav>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Run Your Story.</h1>
        <p>Premium running shoes designed for comfort, speed, and style.</p>
        <button class="btn-primary">Shop Collection</button>
    </section>

    <!-- Chat Widget -->
    <div id="chat-widget">
        <div id="chat-header">
            <span>🏃‍♂️ Running Expert</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">&times;</button>
        </div>
        
        <div id="chat-messages">
            <div class="message bot-msg">Hello! I'm your AI running coach. Ask me anything about shoes!</div>
        </div>

        <div class="sample-questions" id="sample-area">
            <button class="sample-btn" onclick="askSample('I have flat feet, what do you recommend?')">Flat feet advice</button>
            <button class="sample-btn" onclick="askSample('I need shoes for a marathon under $150')">Marathon budget</button>
            <button class="sample-btn" onclick="askSample('What is the difference between the AirFlow and TrailBlazer?')">Compare models</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Chat Toggle Button -->
    <button id="chat-toggle" onclick="toggleChat()">💬</button>

    <script>
    const API_URL = 'https://stride-soul.vercel.app/api/chat';

    const chatWidget = document.getElementById('chat-widget');
    const chatToggle = document.getElementById('chat-toggle');
    const messagesDiv = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sampleArea = document.getElementById('sample-area');

    function toggleChat() {
        const isVisible = chatWidget.style.display === 'flex';
        chatWidget.style.display = isVisible ? 'none' : 'flex';
        chatToggle.style.display = isVisible ? 'block' : 'none';
    }

    // --- IMPROVED FORMATTING FUNCTION ---
    // This converts **text** to <b>text</b> and fixes new lines
    function formatBotText(text) {
        // 1. Replace **word** with <b>word</b>
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // 2. Preserve line breaks (optional, but good for lists)
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.classList.add('message', sender === 'user' ? 'user-msg' : 'bot-msg');
        
        if (sender === 'bot') {
            // Use innerHTML so the <strong> tags work
            div.innerHTML = formatBotText(text);
        } else {
            // Use textContent for user to be safe
            div.textContent = text;
        }
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight; 
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function askSample(question) {
        userInput.value = question;
        sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        sampleArea.style.display = 'none'; 

        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'bot-msg');
        loadingDiv.textContent = 'Thinking...';
        messagesDiv.appendChild(loadingDiv);

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    messages: [{ role: 'user', content: text }] 
                })
            });

            const data = await response.json();
            
            // Apply formatting here
            loadingDiv.innerHTML = formatBotText(data.reply) || "Sorry, I couldn't connect.";

        } catch (error) {
            loadingDiv.textContent = "Error connecting to server.";
            console.error(error);
        }
    }
</script>
</body>
</html>
